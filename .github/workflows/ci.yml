name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y librocksdb-dev libz-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install rocksdb zlib

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Diagnose bowtie2 macOS SIGSEGV (lldb backtrace)
        if: always() && runner.os == 'macOS'
        run: |
          # Find the test binary (in target/debug/deps/, not the main binary)
          TEST_BIN=$(cargo test --no-run --message-format=json 2>/dev/null \
            | jq -r 'select(.executable != null and .target.name == "gpl-boundary" and (.executable | contains("/deps/"))) | .executable' \
            | head -1)
          if [ -z "$TEST_BIN" ]; then
            echo "Could not find test binary, falling back to glob"
            TEST_BIN=$(ls -t target/debug/deps/gpl_boundary-* 2>/dev/null | grep -v '\.d$' | head -1)
          fi
          echo "Test binary: $TEST_BIN"
          # Run one bowtie2 test under lldb to capture backtrace + variable dump.
          # The test is #[ignore] on macOS, but running it directly bypasses that.
          lldb -b \
            -o "run" \
            -o "thread list" \
            -o "bt all" \
            -o "frame select 0" \
            -o "frame variable --show-types" \
            -o "register read x0 x1 x19 x20" \
            -o "quit" \
            -- "$TEST_BIN" --test-threads=1 --exact \
               tools::bowtie2_align::tests::test_bowtie2_align_single_end_fastq_roundtrip \
            || true  # don't fail the step — we want the backtrace in the log

  # Diagnostic: build bowtie2 via CMake instead of cc crate, then run the
  # crashing test. Isolates whether the SIGSEGV is cc-crate-specific or
  # inherent to bowtie2 when called from a Rust binary on macOS aarch64.
  bowtie2-cmake-experiment:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: brew install rocksdb zlib cmake

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build bowtie2 via CMake
        run: |
          cd ext/bowtie2
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBOWTIE_MM=ON \
            -DBOWTIE_SHARED_MEM=OFF \
            -DNO_QUEUELOCK=OFF
          cmake --build build --target bowtie2-combined-s-lib -j$(sysctl -n hw.logicalcpu)
          echo "CMake library built:"
          ls -la build/libbowtie2-combined-s-lib.a

      - name: Build GPL-boundary with CMake-built bowtie2
        env:
          BT2_CMAKE_LIB: ${{ github.workspace }}/ext/bowtie2/build
        run: |
          # Force full rebuild to ensure CMake lib is used (not cached cc-crate build)
          cargo clean -p gpl-boundary 2>/dev/null || true
          cargo build --verbose

      - name: Run ALL tests with CMake-built bowtie2 (including ignored)
        env:
          BT2_CMAKE_LIB: ${{ github.workspace }}/ext/bowtie2/build
        run: cargo test --verbose -- --include-ignored

      - name: Dump compile command comparison
        if: always()
        run: |
          echo "=== CMake compile commands (first .cpp file) ==="
          cat ext/bowtie2/build/compile_commands.json 2>/dev/null \
            | jq -r '.[0].command' || echo "(no compile_commands.json)"
          echo ""
          echo "=== cc crate compile commands ==="
          cargo clean -p gpl-boundary 2>/dev/null || true
          cargo build -vv 2>&1 | grep "running:.*c++" | head -3

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y librocksdb-dev libz-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check
