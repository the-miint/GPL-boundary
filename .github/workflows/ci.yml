name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y librocksdb-dev libz-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install rocksdb zlib

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Diagnose bowtie2 macOS SIGSEGV (lldb backtrace)
        if: runner.os == 'macOS'
        run: |
          # Build the test binary without running it
          TEST_BIN=$(cargo test --no-run --message-format=json 2>/dev/null \
            | jq -r 'select(.executable != null and .target.name == "gpl-boundary") | .executable' \
            | head -1)
          if [ -z "$TEST_BIN" ]; then
            echo "Could not find test binary"
            exit 1
          fi
          echo "Test binary: $TEST_BIN"
          # Run the crashing test under lldb for a backtrace
          lldb -b \
            -o "run" \
            -o "bt all" \
            -o "quit" \
            -- "$TEST_BIN" --test-threads=1 --exact \
               tools::bowtie2_align::tests::test_bowtie2_align_no_unal_zero_records \
            || true  # don't fail the step — we want the backtrace in the log

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y librocksdb-dev libz-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check
