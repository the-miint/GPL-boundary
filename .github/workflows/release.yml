name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for testing the workflow without cutting a tag.
  # The "release" job below is gated on a tag context, so a manual run
  # only exercises the build matrix.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64. Built on 22.04 (glibc 2.35) so the binary runs on
          # Ubuntu 22.04+, Debian 12+, RHEL 9+ — the realistic floor for
          # modern distros without per-distro packaging.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          # macOS Intel.
          - os: macos-13
            target: x86_64-apple-darwin
          # macOS Apple Silicon. Native arm64 runner.
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake libz-dev

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake libomp

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/gpl-boundary

      - name: Package tarball
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/gpl-boundary staging/
          cp LICENSE staging/
          cp README.md staging/
          tar -czf gpl-boundary-${{ matrix.target }}.tar.gz -C staging .

      - uses: actions/upload-artifact@v4
        with:
          name: gpl-boundary-${{ matrix.target }}
          path: gpl-boundary-${{ matrix.target }}.tar.gz
          retention-days: 1
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: sha256sum *.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
            install.sh
          generate_release_notes: true
          fail_on_unmatched_files: true
